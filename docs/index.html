<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GitHub OAuth Redirect</title>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const state = params.get("state");
        const error = params.get("error");
        const scheme = "com.example.diary_app://oauthredirect";

        if (error) {
          window.location.href = `${scheme}?error=${encodeURIComponent(error)}`;
          return;
        }

        if (code) {
          const stateParam = state ? `&state=${encodeURIComponent(state)}` : "";
          window.location.href = `${scheme}?code=${encodeURIComponent(code)}${stateParam}`;
          return;
        }

        document.body.innerText = "No code found.";
      })();
    </script>
  </head>
  <body></body>
</html>
